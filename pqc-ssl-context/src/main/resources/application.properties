# Application Configuration
camel.main.name = PQCSSLContextExample

# YAML route discovery from classpath:camel/
camel.main.routes-include-pattern=classpath:camel/*.yaml

# HTTP Server Configuration (Vert.x platform-http)
camel.server.enabled=true
camel.server.port=8443
camel.server.useGlobalSslContextParameters=true

# -------------------------------------------------------
# SSL/TLS Configuration with Post-Quantum Cryptography
# -------------------------------------------------------

# Enable SSL globally
camel.ssl.enabled=true

# TLS 1.3 is required for PQC named groups
camel.ssl.secureSocketProtocol=TLSv1.3

# Keystore (server identity)
camel.ssl.keyStore=file:keystore.p12
camel.ssl.keystorePassword=changeit
camel.ssl.keyStoreType=PKCS12

# Truststore (trusted certificates)
camel.ssl.trustStore=file:truststore.p12
camel.ssl.trustStorePassword=changeit

# -------------------------------------------------------
# PQC Named Groups (Key Exchange)
# -------------------------------------------------------
# X25519MLKEM768 is a post-quantum hybrid key exchange
# that combines classical X25519 with ML-KEM-768
# (NIST FIPS 203) for quantum-resistant key agreement.
# Fallback to classical x25519 for compatibility.
camel.ssl.namedGroups=X25519MLKEM768,x25519

# -------------------------------------------------------
# Cipher Suites
# -------------------------------------------------------
# Use TLS 1.3 cipher suites (required for PQC named groups)
camel.ssl.cipherSuites=TLS_AES_256_GCM_SHA384,TLS_AES_128_GCM_SHA256
