# Post-Quantum SSLContext Example
# Demonstrates PQC-enabled TLS using X25519MLKEM768 hybrid key exchange.
# Performs a full TLS handshake between an SSLServerSocket and SSLSocket,
# both configured with Camel's SSLContextParameters, proving PQC negotiation.

# Route 1: PQC TLS handshake verification at startup
# Creates a server and client using Camel's SSLContext with X25519MLKEM768,
# performs a real TLS handshake, and logs the negotiated parameters.
- route:
    id: pqc-verify
    from:
      uri: timer:pqc-verify
      parameters:
        repeatCount: 1
        delay: 1000
      steps:
        - log: "=== Post-Quantum TLS Handshake Verification ==="
        - script:
            groovy: |
              import javax.net.ssl.*
              import java.security.SecureRandom

              // Build SSLContext from Camel's global SSLContextParameters
              def sslParams = camelContext.getSSLContextParameters()
              def sslCtx = sslParams.createSSLContext(camelContext)

              def serverSocket = null
              def clientSocket = null
              def accepted = null

              try {
                  // --- Server side ---
                  serverSocket = sslCtx.getServerSocketFactory()
                      .createServerSocket(0) as SSLServerSocket  // port 0 = random available port
                  def port = serverSocket.getLocalPort()

                  // Configure server to use PQC named groups
                  def serverParams = serverSocket.getSSLParameters()
                  serverParams.setNamedGroups(["X25519MLKEM768", "x25519"] as String[])
                  serverParams.setProtocols(["TLSv1.3"] as String[])
                  serverSocket.setSSLParameters(serverParams)

                  // --- Client side (in a thread) ---
                  def handshakeResult = new java.util.concurrent.CompletableFuture()

                  Thread.start {
                      try {
                          def cs = sslCtx.getSocketFactory()
                              .createSocket("localhost", port) as SSLSocket

                          // Client offers ONLY X25519MLKEM768 - no classical fallback
                          def clientParams = cs.getSSLParameters()
                          clientParams.setNamedGroups(["X25519MLKEM768"] as String[])
                          clientParams.setProtocols(["TLSv1.3"] as String[])
                          cs.setSSLParameters(clientParams)

                          cs.startHandshake()

                          def session = cs.getSession()
                          handshakeResult.complete([
                              protocol: session.getProtocol(),
                              cipherSuite: session.getCipherSuite(),
                              peerHost: session.getPeerHost(),
                          ])
                          cs.close()
                      } catch (Exception e) {
                          handshakeResult.completeExceptionally(e)
                      }
                  }

                  // Server accepts the connection
                  accepted = serverSocket.accept() as SSLSocket
                  accepted.startHandshake()
                  def serverSession = accepted.getSession()

                  // Wait for client result
                  def clientResult = handshakeResult.get(10, java.util.concurrent.TimeUnit.SECONDS)

                  def result = [
                      pqcVerified: true,
                      server: [
                          protocol: serverSession.getProtocol(),
                          cipherSuite: serverSession.getCipherSuite(),
                          namedGroupsConfigured: ["X25519MLKEM768", "x25519"],
                      ],
                      client: [
                          protocol: clientResult.protocol,
                          cipherSuite: clientResult.cipherSuite,
                          namedGroupOffered: "X25519MLKEM768 (only PQC group, no classical fallback)",
                      ],
                      message: "PQC VERIFIED: TLS 1.3 handshake succeeded with X25519MLKEM768 as the only client-offered group"
                  ]

                  exchange.message.setBody(groovy.json.JsonOutput.prettyPrint(
                      groovy.json.JsonOutput.toJson(result)))

              } catch (Exception e) {
                  def result = [
                      pqcVerified: false,
                      error: e.getClass().getSimpleName() + ": " + e.getMessage(),
                      message: "PQC verification FAILED"
                  ]
                  if (e.getMessage()?.contains("missing_extension")) {
                      result.hint = "X25519MLKEM768 not supported by this JDK. Requires JDK 24+."
                  }
                  exchange.message.setBody(groovy.json.JsonOutput.prettyPrint(
                      groovy.json.JsonOutput.toJson(result)))
              } finally {
                  if (accepted != null) try { accepted.close() } catch (Exception ignore) {}
                  if (serverSocket != null) try { serverSocket.close() } catch (Exception ignore) {}
              }
        - log: "PQC Verification Result:\n${body}"

# Route 2: REST API server secured with PQC-enabled TLS
- route:
    id: pqc-secure-server
    from:
      uri: platform-http:/api/data
      parameters:
        httpMethodRestrict: GET
      steps:
        - log: "Received request on PQC-secured endpoint"
        - setBody:
            simple: |
              {
                "message": "This response was delivered over a TLS 1.3 connection with post-quantum key exchange",
                "algorithm": "X25519MLKEM768 (hybrid: X25519 + ML-KEM-768)",
                "protocol": "TLS 1.3",
                "timestamp": "${date:now:yyyy-MM-dd'T'HH:mm:ss.SSSZ}"
              }
        - setHeader:
            name: Content-Type
            constant: "application/json"

# Route 3: REST endpoint to run PQC verification on demand
- route:
    id: pqc-verify-endpoint
    from:
      uri: platform-http:/api/verify-pqc
      parameters:
        httpMethodRestrict: GET
      steps:
        - log: "PQC verification requested via API"
        - script:
            groovy: |
              import javax.net.ssl.*

              def sslParams = camelContext.getSSLContextParameters()
              def sslCtx = sslParams.createSSLContext(camelContext)

              def serverSocket = null
              def accepted = null

              try {
                  serverSocket = sslCtx.getServerSocketFactory()
                      .createServerSocket(0) as SSLServerSocket
                  def port = serverSocket.getLocalPort()

                  def sp = serverSocket.getSSLParameters()
                  sp.setNamedGroups(["X25519MLKEM768", "x25519"] as String[])
                  sp.setProtocols(["TLSv1.3"] as String[])
                  serverSocket.setSSLParameters(sp)

                  def handshakeResult = new java.util.concurrent.CompletableFuture()

                  Thread.start {
                      try {
                          def cs = sslCtx.getSocketFactory()
                              .createSocket("localhost", port) as SSLSocket
                          def cp = cs.getSSLParameters()
                          cp.setNamedGroups(["X25519MLKEM768"] as String[])
                          cp.setProtocols(["TLSv1.3"] as String[])
                          cs.setSSLParameters(cp)
                          cs.startHandshake()
                          def s = cs.getSession()
                          handshakeResult.complete([protocol: s.getProtocol(), cipherSuite: s.getCipherSuite()])
                          cs.close()
                      } catch (Exception e) {
                          handshakeResult.completeExceptionally(e)
                      }
                  }

                  accepted = serverSocket.accept() as SSLSocket
                  accepted.startHandshake()

                  def clientResult = handshakeResult.get(10, java.util.concurrent.TimeUnit.SECONDS)

                  exchange.message.setBody(groovy.json.JsonOutput.prettyPrint(
                      groovy.json.JsonOutput.toJson([
                          pqcVerified: true,
                          protocol: clientResult.protocol,
                          cipherSuite: clientResult.cipherSuite,
                          namedGroup: "X25519MLKEM768",
                          message: "PQC VERIFIED: TLS handshake succeeded using only X25519MLKEM768"
                      ])))
              } catch (Exception e) {
                  def msg = e.getMessage() ?: e.getCause()?.getMessage() ?: "unknown error"
                  exchange.message.setBody(groovy.json.JsonOutput.prettyPrint(
                      groovy.json.JsonOutput.toJson([
                          pqcVerified: false,
                          error: msg,
                          message: "PQC verification FAILED"
                      ])))
              } finally {
                  if (accepted != null) try { accepted.close() } catch (Exception ignore) {}
                  if (serverSocket != null) try { serverSocket.close() } catch (Exception ignore) {}
              }
        - setHeader:
            name: Content-Type
            constant: "application/json"

# Route 4: SSL configuration info endpoint
- route:
    id: pqc-ssl-info
    from:
      uri: platform-http:/api/ssl-info
      parameters:
        httpMethodRestrict: GET
      steps:
        - script:
            groovy: |
              def sslParams = camelContext.getSSLContextParameters()
              def sslCtx = sslParams.createSSLContext(camelContext)
              def params = sslCtx.getDefaultSSLParameters()

              def protocols = params.getProtocols()?.toList() ?: []
              def ciphers = params.getCipherSuites()?.toList() ?: []
              def namedGroups = params.getNamedGroups()?.toList() ?: []

              exchange.message.setBody(groovy.json.JsonOutput.prettyPrint(
                  groovy.json.JsonOutput.toJson([
                      javaVersion: System.getProperty("java.version"),
                      protocols: protocols,
                      cipherSuites: ciphers,
                      namedGroups: namedGroups,
                      pqcEnabled: namedGroups.any { it.toUpperCase().contains("MLKEM") }
                  ])))
        - setHeader:
            name: Content-Type
            constant: "application/json"
