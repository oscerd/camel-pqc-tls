# Application Configuration
camel.main.name = PQCSSLContextJDK21Example

# YAML route discovery from classpath:camel/
camel.main.routes-include-pattern=classpath:camel/*.yaml

# HTTP Server Configuration (Vert.x platform-http)
# REST endpoints are served over plain HTTP.
# The PQC TLS handshake is performed self-contained using
# BouncyCastle JSSE (BCJSSE) within the Camel routes.
camel.server.enabled=true
camel.server.port=8080
